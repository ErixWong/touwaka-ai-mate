services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: touwaka-mate
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=${DB_HOST:-db}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-touwaka_mate}
      - DB_USER=${DB_USER:-touwaka}
      - DB_PASSWORD=${DB_PASSWORD:-touwaka_secret}
      - JWT_SECRET=${JWT_SECRET:-change-this-secret-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-change-this-refresh-secret-in-production}
      - DATA_BASE_PATH=/app/data
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - app_data:/app/data
    networks:
      - touwaka-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  touwaka-network:
    driver: bridge

volumes:
  app_data:
    driver: local